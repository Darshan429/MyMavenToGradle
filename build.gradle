plugins {
    id 'java'
    id 'application'
    id 'maven-publish'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.29.0'
    testImplementation 'junit:junit:3.8.1'
}
